<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 管理后台 - 改善提案系统</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar .form-select { max-width: 150px; }
        .proposal-card { padding: 16px; margin-bottom: 12px; }
        .proposal-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .proposal-title { font-size: 16px; font-weight: 600; }
        .proposal-meta { color: var(--color-text-muted); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
        .proposal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .score-input { width: 60px; padding: 4px 8px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 4px; color: var(--color-text); }
        .comment-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        .comment-item { padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .comment-form { display: flex; gap: 8px; margin-top: 12px; }
        .comment-form input { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-brand">💡 改善提案系统</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="admin.html" class="nav-link active">📋 管理后台</a>
                <a href="stats.html" class="nav-link">📊 数据看板</a>
                <a href="users.html" class="nav-link">👥 用户管理</a>
            </div>
            <div class="nav-user">
                <span id="user-display"></span>
                <button class="nav-btn" onclick="logout()">退出</button>
            </div>
        </nav>
        
        <!-- 统计 -->
        <div class="stats-grid" style="margin-bottom: 24px;">
            <div class="stat-card blue"><div class="num" id="stat-total">0</div><div class="label">总提案</div></div>
            <div class="stat-card orange"><div class="num" id="stat-pending">0</div><div class="label">待审核</div></div>
            <div class="stat-card green"><div class="num" id="stat-approved">0</div><div class="label">已采纳</div></div>
            <div class="stat-card purple"><div class="num" id="stat-completed">0</div><div class="label">已完成</div></div>
        </div>
        
        <!-- 筛选 -->
        <div class="filter-bar">
            <select id="filter-status" class="form-select" onchange="loadProposals()">
                <option value="">全部状态</option>
                <option value="pending">待审核</option>
                <option value="reviewing">审核中</option>
                <option value="approved">已采纳</option>
                <option value="completed">已完成</option>
                <option value="rejected">已拒绝</option>
            </select>
            <select id="filter-category" class="form-select" onchange="loadProposals()">
                <option value="">全部分类</option>
                <option value="流程优化">流程优化</option>
                <option value="工具改进">工具改进</option>
                <option value="文档完善">文档完善</option>
                <option value="环境改善">环境改善</option>
                <option value="其他">其他</option>
            </select>
            <select id="filter-sentiment" class="form-select" onchange="loadProposals()">
                <option value="">全部情感</option>
                <option value="positive">正面 😊</option>
                <option value="neutral">中立 😐</option>
                <option value="negative">负面 😔</option>
            </select>
            <input type="text" id="search-input" class="form-input" placeholder="搜索..." style="max-width:200px;" oninput="debounceSearch()">
        </div>
        
        <!-- 提案列表 -->
        <div id="proposal-list">
            <div class="empty-state">加载中...</div>
        </div>
    </div>
    
    <!-- 详情 Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal" style="max-width:700px;">
            <h2 class="modal-title" id="modal-title">提案详情</h2>
            <div id="modal-content"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeDetailModal()">关闭</button>
                <button class="modal-btn modal-btn-primary" id="modal-action-btn">处理</button>
            </div>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script>
        let proposals = [];
        let currentProposal = null;
        let searchTimeout = null;
        
        // 检查登录
        requireAuth();
        
        // 初始化
        function initUserDisplay() {
            const user = parseToken();
            const userDisplay = document.getElementById('user-display');
            if (user && userDisplay) {
                userDisplay.textContent = (user.display_name || user.username) + ' (' + user.role + ')';
            }
        }
        initUserDisplay();
        
        // 自动登出
        let idleTime = 0;
        setInterval(() => { idleTime++; if (idleTime >= 10) { if (confirm('长时间未操作，是否继续？')) { idleTime = 0; } else { logout(); } } }, 60000);
        document.addEventListener('click', () => idleTime = 0);
        document.addEventListener('keypress', () => idleTime = 0);
        
        // 加载统计
        async function loadStats() {
            try {
                const data = await apiGet('/api/stats/overview');
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-pending').textContent = data.pending + data.reviewing;
                document.getElementById('stat-approved').textContent = data.approved;
                document.getElementById('stat-completed').textContent = data.completed;
            } catch (e) { console.error(e); }
        }
        
        // 防抖搜索
        function debounceSearch() {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadProposals, 500);
        }
        
        // 加载提案
        async function loadProposals() {
            const list = document.getElementById('proposal-list');
            const status = document.getElementById('filter-status').value;
            const category = document.getElementById('filter-category').value;
            const sentiment = document.getElementById('filter-sentiment').value;
            const search = document.getElementById('search-input').value;
            
            try {
                let url = `${API_BASE}/api/proposals?limit=100`;
                if (status) url += `&status=${status}`;
                if (category) url += `&category=${category}`;
                if (sentiment) url += `&sentiment=${sentiment}`;
                if (search) url += `&search=${encodeURIComponent(search)}`;
                
                proposals = await apiGet('/api/proposals');
                
                if (proposals.length === 0) {
                    list.innerHTML = '<div class="empty-state">暂无提案</div>';
                    return;
                }
                
                list.innerHTML = proposals.map(p => `
                    <div class="card proposal-card">
                        <div class="proposal-card-header">
                            <span class="proposal-title">${escapeHtml(p.title)}</span>
                            <div style="display:flex;gap:8px;align-items:center;">
                                ${p.sentiment ? `<span>${p.sentiment === 'positive' ? '😊' : p.sentiment === 'negative' ? '😔' : '😐'}</span>` : ''}
                                <span class="badge badge-${p.status}">${getStatusText(p.status)}</span>
                            </div>
                        </div>
                        <p style="color:var(--color-text-secondary);font-size:14px;margin:8px 0;">${escapeHtml(p.problem_desc || '').substring(0, 150)}...</p>
                        <div class="proposal-meta">
                            <span>📁 ${p.category}</span>
                            ${p.tags && p.tags.length ? `<span>🏷️ ${p.tags.join(', ')}</span>` : ''}
                            <span>💬 ${p.comment_count || 0}</span>
                            <span>📎 ${p.attachment_count || 0}</span>
                            <span>⭐ <input type="number" class="score-input" value="${p.score || 0}" min="0" max="100" onchange="updateScore(${p.id}, this.value)"></span>
                            <span>📅 ${formatDate(p.created_at)}</span>
                            <span>👤 ${p.submitter || '匿名'}</span>
                        </div>
                        <div class="proposal-actions" style="margin-top:12px;">
                            <button class="btn btn-sm btn-primary" onclick="viewProposal(${p.id})">查看详情</button>
                            ${p.status === 'pending' ? `<button class="btn btn-sm btn-secondary" onclick="updateStatus(${p.id}, 'reviewing')">审核</button>` : ''}
                            ${p.status === 'reviewing' ? `<button class="btn btn-sm btn-secondary" onclick="updateStatus(${p.id}, 'approved')">采纳</button>
                            <button class="btn btn-sm btn-danger" onclick="updateStatus(${p.id}, 'rejected')">拒绝</button>` : ''}
                            ${p.status === 'approved' ? `<button class="btn btn-sm btn-secondary" onclick="updateStatus(${p.id}, 'completed')">完成</button>` : ''}
                            <button class="btn btn-sm btn-danger" onclick="deleteProposal(${p.id})">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }
        
        // 更新评分
        async function updateScore(id, score) {
            try { await apiPut(`/api/proposals/${id}`, { score: parseInt(score) }); showToast('评分已更新'); } catch (e) { showToast('更新失败', 'error'); }
        }
        
        // 查看详情
        async function viewProposal(id) {
            currentProposal = proposals.find(p => p.id === id);
            if (!currentProposal) return;
            
            document.getElementById('modal-title').textContent = currentProposal.title;
            
            let content = `
                <div style="margin-bottom:16px;">
                    <p><strong>分类：</strong>${currentProposal.category}</p>
                    <p><strong>提交人：</strong>${currentProposal.submitter || '匿名'}</p>
                    <p><strong>优先级：</strong>${currentProposal.priority}</p>
                    <p><strong>情感：</strong>${currentProposal.sentiment === 'positive' ? '😊 正面' : currentProposal.sentiment === 'negative' ? '😔 负面' : '😐 中立'}</p>
                    <p><strong>评分：</strong>${currentProposal.score || 0}分</p>
                    <p><strong>提交时间：</strong>${formatDate(currentProposal.created_at)}</p>
                </div>
                <div style="margin-bottom:16px;">
                    <strong>问题描述：</strong>
                    <p style="color:var(--color-text-secondary);margin-top:8px;white-space:pre-wrap;">${escapeHtml(currentProposal.problem_desc || '')}</p>
                </div>
                ${currentProposal.solution ? `<div style="margin-bottom:16px;"><strong>解决方案：</strong><p style="color:var(--color-text-secondary);margin-top:8px;white-space:pre-wrap;">${escapeHtml(currentProposal.solution)}</p></div>` : ''}
            `;
            
            // 附件
            if (currentProposal.attachments && currentProposal.attachments.length > 0) {
                content += `<div style="margin-bottom:16px;"><strong>附件：</strong><ul style="margin-top:8px;">`;
                content += currentProposal.attachments.map(a => `<li style="margin:4px 0;"><a href="${API_BASE}/api/attachments/${a.id}/download" style="color:var(--color-primary);">📎 ${a.filename}</a> (${(a.filesize/1024).toFixed(1)}KB)</li>`).join('');
                content += `</ul></div>`;
            }
            
            // 评论
            content += `<div class="comment-section"><strong>评论 (${currentProposal.comments?.length || 0})</strong>`;
            if (currentProposal.comments && currentProposal.comments.length > 0) {
                content += currentProposal.comments.map(c => `<div class="comment-item"><span style="color:var(--color-primary);">${c.user}</span>: ${escapeHtml(c.content)} <span style="color:var(--color-text-muted);font-size:12px;margin-left:8px;">${formatDate(c.created_at)}</span></div>`).join('');
            }
            content += `<div class="comment-form"><input type="text" id="comment-input" class="form-input" placeholder="添加评论..."><button class="btn btn-sm btn-primary" onclick="addComment(${currentProposal.id})">发送</button></div>`;
            content += `</div>`;
            
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('detail-modal').classList.add('active');
        }
        
        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }
        
        // 添加评论
        async function addComment(proposalId) {
            const input = document.getElementById('comment-input');
            if (!input.value.trim()) return;
            try {
                await apiPost(`/api/proposals/${proposalId}/comments`, { content: input.value });
                showToast('评论成功');
                input.value = '';
                loadProposals();
                viewProposal(proposalId);
            } catch (e) { showToast('评论失败', 'error'); }
        }
        
        // 更新状态
        async function updateStatus(id, status) {
            try { await apiPut(`/api/proposals/${id}`, { status }); showToast('状态已更新'); loadStats(); loadProposals(); } catch (e) { showToast('更新失败', 'error'); }
        }
        
        // 删除提案
        async function deleteProposal(id) {
            if (!confirm('确定要删除这个提案吗？')) return;
            try { await apiDelete(`/api/proposals/${id}`); showToast('删除成功'); loadStats(); loadProposals(); } catch (e) { showToast('删除失败', 'error'); }
        }
        
        // 初始化
        loadStats();
        loadProposals();
    </script>
</body>
</html>
