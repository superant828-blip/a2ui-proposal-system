<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 改善提案系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #9ca3af;
            font-size: 14px;
        }
        
        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card.blue { background: rgba(59,130,246,0.15); }
        .stat-card.orange { background: rgba(245,158,11,0.15); }
        .stat-card.green { background: rgba(16,185,129,0.15); }
        .stat-card.purple { background: rgba(139,92,246,0.15); }
        
        .stat-card .num {
            font-size: 32px;
            font-weight: 700;
        }
        
        .stat-card.blue .num { color: #3b82f6; }
        .stat-card.orange .num { color: #f59e0b; }
        .stat-card.green .num { color: #10b981; }
        .stat-card.purple .num { color: #8b5cf6; }
        
        .stat-card .label {
            color: #9ca3af;
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab-btn.primary {
            background: #3b82f6;
            color: #fff;
        }
        
        .tab-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #9ca3af;
        }
        
        .tab-btn:hover {
            opacity: 0.8;
        }
        
        /* Form */
        .form-container {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .submit-btn:hover {
            background: #2563eb;
        }
        
        /* Proposal List */
        .proposal-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .proposal-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
        }
        
        .proposal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .proposal-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .status-badge.pending { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .status-badge.reviewing { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-badge.approved { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status-badge.completed { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.rejected { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .proposal-body {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .proposal-footer {
            color: #6b7280;
            font-size: 12px;
        }
        
        .category-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .priority-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .priority-tag.high { background: rgba(239,68,68,0.2); color: #ef4444; }
        .priority-tag.normal { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .priority-tag.low { background: rgba(107,114,128,0.2); color: #9ca3af; }
        
        /* Tab Content */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #9ca3af;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💡 改善提案系统</h1>
            <p>让每个声音都被听见</p>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card blue">
                <div class="num" id="stat-total">0</div>
                <div class="label">总提案</div>
            </div>
            <div class="stat-card orange">
                <div class="num" id="stat-reviewing">0</div>
                <div class="label">审核中</div>
            </div>
            <div class="stat-card green">
                <div class="num" id="stat-approved">0</div>
                <div class="label">已采纳</div>
            </div>
            <div class="stat-card purple">
                <div class="num" id="stat-completed">0</div>
                <div class="label">已完成</div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn primary" onclick="switchTab('submit')">📝 提交提案</button>
            <button class="tab-btn secondary" onclick="switchTab('list')">📋 提案列表</button>
        </div>
        
        <!-- Submit Form -->
        <div id="submit-tab" class="tab-content active">
            <div class="form-container">
                <form id="proposal-form">
                    <div class="form-group">
                        <label>提案标题 *</label>
                        <input type="text" id="title" required maxlength="200" placeholder="请输入提案标题">
                    </div>
                    
                    <div class="form-group">
                        <label>分类 *</label>
                        <select id="category" required>
                            <option value="">请选择分类</option>
                            <option value="流程优化">🔄 流程优化</option>
                            <option value="工具改进">🛠️ 工具改进</option>
                            <option value="文档完善">📝 文档完善</option>
                            <option value="环境改善">🏠 环境改善</option>
                            <option value="其他">📌 其他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>问题描述 *</label>
                        <textarea id="problem_desc" required maxlength="2000" placeholder="请详细描述需要改进的问题"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>建议解决方案</label>
                        <textarea id="solution" placeholder="请描述您的改进建议"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>预期效果</label>
                        <textarea id="expected_effect" placeholder="预期达成的效果"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>优先级</label>
                        <select id="priority">
                            <option value="low">低</option>
                            <option value="normal" selected>普通</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>提交人</label>
                        <input type="text" id="submitter" placeholder="请输入您的名字">
                    </div>
                    
                    <button type="submit" class="submit-btn">提交提案</button>
                </form>
            </div>
        </div>
        
        <!-- Proposal List -->
        <div id="list-tab" class="tab-content">
            <div class="proposal-list" id="proposal-list">
                <div class="empty-state">暂无提案，点击"提交提案"创建第一个</div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://192.168.80.209:8004';
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('primary');
                el.classList.add('secondary');
            });
            
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.remove('secondary');
            event.target.classList.add('primary');
            
            if (tab === 'list') {
                loadProposals();
            }
        }
        
        // Show toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Load stats
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats/overview`);
                const data = await res.json();
                document.getElementById('stat-total').textContent = data.total || 0;
                document.getElementById('stat-reviewing').textContent = data.reviewing || 0;
                document.getElementById('stat-approved').textContent = data.approved || 0;
                document.getElementById('stat-completed').textContent = data.completed || 0;
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }
        
        // Load proposals
        async function loadProposals() {
            const list = document.getElementById('proposal-list');
            try {
                const res = await fetch(`${API_BASE}/api/proposals`);
                const proposals = await res.json();
                
                if (proposals.length === 0) {
                    list.innerHTML = '<div class="empty-state">暂无提案</div>';
                    return;
                }
                
                const statusMap = {
                    'pending': '待审核',
                    'reviewing': '审核中',
                    'approved': '已采纳',
                    'completed': '已完成',
                    'rejected': '已拒绝'
                };
                
                list.innerHTML = proposals.map(p => `
                    <div class="proposal-item">
                        <div class="proposal-header">
                            <span class="proposal-title">${escapeHtml(p.title)}</span>
                            <span class="status-badge ${p.status}">${statusMap[p.status] || p.status}</span>
                        </div>
                        <div class="proposal-body">${escapeHtml(p.problem_desc || '')}</div>
                        <div class="proposal-footer">
                            <span class="category-tag">${p.category}</span>
                            ${p.priority !== 'normal' ? `<span class="priority-tag ${p.priority}">${p.priority === 'high' ? '高优先' : '低优先'}</span>` : ''}
                            <span>提交于 ${p.created_at ? p.created_at.substring(0, 10) : ''} · ${p.submitter || '匿名'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state">加载失败，请检查后端服务</div>';
            }
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Submit proposal
        document.getElementById('proposal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                problem_desc: document.getElementById('problem_desc').value,
                solution: document.getElementById('solution').value,
                expected_effect: document.getElementById('expected_effect').value,
                priority: document.getElementById('priority').value,
                submitter: document.getElementById('submitter').value || '匿名'
            };
            
            try {
                const res = await fetch(`${API_BASE}/api/proposals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('提案提交成功！');
                    e.target.reset();
                    loadStats();
                    switchTab('list');
                } else {
                    const err = await res.json();
                    showToast(err.detail || '提交失败', 'error');
                }
            } catch (e) {
                showToast('网络错误，请检查后端服务', 'error');
            }
        });
        
        // Init
        loadStats();
    </script>
</body>
</html>
