<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 改善提案系统</title>
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <!-- 导航栏 -->
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-brand">💡 改善提案系统</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">🏠 首页</a>
                <a href="admin.html" class="nav-link">📋 管理后台</a>
                <a href="stats.html" class="nav-link">📊 数据看板</a>
                <a href="users.html" class="nav-link">👥 用户管理</a>
            </div>
            <div class="nav-user">
                <span id="user-display"></span>
                <button class="nav-btn" id="login-btn" onclick="window.location.href='login.html'">登录</button>
                <button class="nav-btn" id="logout-btn" onclick="logout()" style="display:none;">退出</button>
            </div>
        </nav>
    </div>
    
    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="num" id="stat-total">0</div>
                <div class="label">总提案</div>
            </div>
            <div class="stat-card orange">
                <div class="num" id="stat-reviewing">0</div>
                <div class="label">审核中</div>
            </div>
            <div class="stat-card green">
                <div class="num" id="stat-approved">0</div>
                <div class="label">已采纳</div>
            </div>
            <div class="stat-card purple">
                <div class="num" id="stat-completed">0</div>
                <div class="label">已完成</div>
            </div>
        </div>
        
        <!-- Tab 切换 -->
        <div style="display:flex;gap:12px;margin-bottom:24px;">
            <button class="btn btn-primary" id="tab-submit" onclick="switchTab('submit')">📝 提交提案</button>
            <button class="btn btn-secondary" id="tab-list" onclick="switchTab('list')">📋 提案列表</button>
            <button class="btn btn-secondary" id="tab-my" onclick="switchTab('my')" style="display:none;">👤 我的提案</button>
        </div>
        
        <!-- 提交表单（无需登录） -->
        <div id="submit-tab">
            <div class="card">
                <div style="margin-bottom:16px;padding:12px;background:rgba(59,130,246,0.1);border-radius:8px;">
                    <span style="color:#3b82f6;">💡 无需登录即可提交提案</span>
                </div>
                
                <form id="proposal-form">
                    <div class="form-group">
                        <label class="form-label">提案标题 *</label>
                        <input type="text" id="title" class="form-input" required maxlength="200" placeholder="请输入提案标题">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">分类 *</label>
                        <select id="category" class="form-select" required>
                            <option value="">请选择分类</option>
                            <option value="流程优化">🔄 流程优化</option>
                            <option value="工具改进">🛠️ 工具改进</option>
                            <option value="文档完善">📝 文档完善</option>
                            <option value="环境改善">🏠 环境改善</option>
                            <option value="其他">📌 其他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">标签</label>
                        <div id="tag-options" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                            <!-- 动态加载标签 -->
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">问题描述 *</label>
                        <textarea id="problem_desc" class="form-textarea" required maxlength="2000" placeholder="请详细描述需要改进的问题"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">建议解决方案</label>
                        <textarea id="solution" class="form-textarea" placeholder="请描述您的改进建议"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">预期效果</label>
                        <textarea id="expected_effect" class="form-textarea" placeholder="预期达成的效果"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">优先级</label>
                        <select id="priority" class="form-select">
                            <option value="low">低</option>
                            <option value="normal" selected>普通</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">您的姓名（选填）</label>
                        <input type="text" id="submitter" class="form-input" placeholder="匿名提交">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width:100%;">提交提案</button>
                </form>
            </div>
        </div>
        
        <!-- 提案列表（无需登录） -->
        <div id="list-tab" style="display:none;">
            <div style="margin-bottom:16px;">
                <input type="text" id="search-input" class="form-input" placeholder="🔍 搜索提案..." style="max-width:300px;" oninput="debounceSearch()">
                <select id="filter-status" class="form-select" style="max-width:150px;display:inline-block;margin-left:12px;" onchange="loadProposals()">
                    <option value="">全部状态</option>
                    <option value="pending">待审核</option>
                    <option value="reviewing">审核中</option>
                    <option value="approved">已采纳</option>
                    <option value="completed">已完成</option>
                    <option value="rejected">已拒绝</option>
                </select>
            </div>
            <div id="proposal-list">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
        
        <!-- 我的提案（需要登录） -->
        <div id="my-tab" style="display:none;">
            <div class="empty-state">请先登录查看我的提案</div>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script>
        let currentTab = 'submit';
        let searchTimeout = null;
        
        // 检查登录状态
        function checkLogin() {
            const user = parseToken();
            const myTab = document.getElementById('tab-my');
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userDisplay = document.getElementById('user-display');
            
            if (user) {
                if (myTab) myTab.style.display = 'inline-flex';
                if (loginBtn) loginBtn.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'inline-block';
                if (userDisplay) userDisplay.textContent = user.display_name || user.username;
                return true;
            } else {
                if (myTab) myTab.style.display = 'none';
                if (loginBtn) loginBtn.style.display = 'inline-block';
                if (logoutBtn) logoutBtn.style.display = 'none';
                return false;
            }
        }
        
        // Tab 切换
        function switchTab(tab) {
            currentTab = tab;
            
            document.getElementById('submit-tab').style.display = tab === 'submit' ? 'block' : 'none';
            document.getElementById('list-tab').style.display = tab === 'list' ? 'block' : 'none';
            document.getElementById('my-tab').style.display = tab === 'my' ? 'block' : 'none';
            
            document.getElementById('tab-submit').className = tab === 'submit' ? 'btn btn-primary' : 'btn btn-secondary';
            document.getElementById('tab-list').className = tab === 'list' ? 'btn btn-primary' : 'btn btn-secondary';
            document.getElementById('tab-my').className = tab === 'my' ? 'btn btn-primary' : 'btn btn-secondary';
            
            if (tab === 'list') {
                loadProposals();
            } else if (tab === 'my') {
                if (checkLogin()) {
                    loadMyProposals();
                }
            }
            
            // 未登录时跳转到列表
            if (tab === 'my' && !parseToken()) {
                switchTab('list');
                showToast('查看我的提案需要先登录', 'error');
            }
        }
        
        // 防抖搜索
        function debounceSearch() {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadProposals, 500);
        }
        
        // 加载标签
        async function loadTags() {
            try {
                const res = await fetch(`${API_BASE}/api/tags`);
                const tags = await res.json();
                const container = document.getElementById('tag-options');
                container.innerHTML = tags.map(t => `
                    <label style="display:flex;align-items:center;gap:4px;padding:4px 8px;background:${t.color}22;border-radius:4px;cursor:pointer;">
                        <input type="checkbox" name="tags" value="${t.name}" style="accent-color:${t.color}">
                        <span style="color:${t.color};font-size:12px;">${t.name}</span>
                    </label>
                `).join('');
            } catch (e) {
                console.error('加载标签失败:', e);
            }
        }
        
        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats/overview`);
                const data = await res.json();
                document.getElementById('stat-total').textContent = data.total || 0;
                document.getElementById('stat-reviewing').textContent = data.reviewing || 0;
                document.getElementById('stat-approved').textContent = data.approved || 0;
                document.getElementById('stat-completed').textContent = data.completed || 0;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }
        
        // 加载提案列表（无需登录）
        async function loadProposals() {
            const list = document.getElementById('proposal-list');
            const search = document.getElementById('search-input')?.value || '';
            const status = document.getElementById('filter-status')?.value || '';
            
            try {
                let url = `${API_BASE}/api/proposals?limit=50`;
                if (search) url += `&search=${encodeURIComponent(search)}`;
                if (status) url += `&status=${encodeURIComponent(status)}`;
                
                const res = await fetch(url);
                const proposals = await res.json();
                
                if (proposals.length === 0) {
                    list.innerHTML = '<div class="empty-state">暂无提案</div>';
                    return;
                }
                
                list.innerHTML = proposals.map(p => `
                    <div class="card" style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
                            <span style="font-weight:600;font-size:16px;">${escapeHtml(p.title)}</span>
                            <div style="display:flex;gap:8px;align-items:center;">
                                ${p.sentiment ? `<span class="badge badge-${p.sentiment === 'positive' ? 'completed' : p.sentiment === 'negative' ? 'rejected' : 'pending'}">${p.sentiment === 'positive' ? '😊' : p.sentiment === 'negative' ? '😔' : '😐'}</span>` : ''}
                                ${p.score > 0 ? `<span style="color:#f59e0b;font-size:12px;">⭐${p.score}</span>` : ''}
                                <span class="badge badge-${p.status}">${getStatusText(p.status)}</span>
                            </div>
                        </div>
                        <p style="color:var(--color-text-secondary);font-size:14px;margin-bottom:8px;line-height:1.5;">${escapeHtml(p.problem_desc || '').substring(0, 200)}${p.problem_desc?.length > 200 ? '...' : ''}</p>
                        <div style="color:var(--color-text-muted);font-size:12px;display:flex;gap:12px;flex-wrap:wrap;">
                            <span>📁 ${p.category}</span>
                            ${p.tags && p.tags.length ? `<span>🏷️ ${p.tags.join(', ')}</span>` : ''}
                            <span>💬 ${p.comment_count || 0}</span>
                            <span>📎 ${p.attachment_count || 0}</span>
                            <span>📅 ${formatDate(p.created_at)}</span>
                            <span>👤 ${p.submitter || '匿名'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }
        
        // 加载我的提案（需要登录）
        async function loadMyProposals() {
            const user = parseToken();
            if (!user) return;
            
            const list = document.getElementById('my-tab');
            try {
                const res = await fetch(`${API_BASE}/api/proposals?search=${encodeURIComponent(user.username)}`);
                const proposals = await res.json();
                
                // 只显示自己提交的
                const myProposals = proposals.filter(p => p.submitter === user.username || p.submitter === user.display_name);
                
                if (myProposals.length === 0) {
                    list.innerHTML = '<div class="empty-state">您还没有提交过提案</div>';
                    return;
                }
                
                list.innerHTML = myProposals.map(p => `
                    <div class="card" style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span style="font-weight:600;">${escapeHtml(p.title)}</span>
                            <span class="badge badge-${p.status}">${getStatusText(p.status)}</span>
                        </div>
                        <p style="color:var(--color-text-secondary);font-size:14px;margin-bottom:8px;">${escapeHtml(p.problem_desc || '')}</p>
                        <div style="color:var(--color-text-muted);font-size:12px;">
                            <span>📁 ${p.category}</span>
                            <span>⭐ 评分: ${p.score || 0}</span>
                            <span>📅 ${formatDate(p.created_at)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }
        
        // 提交表单
        document.getElementById('proposal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 获取选中的标签
            const selectedTags = Array.from(document.querySelectorAll('input[name="tags"]:checked')).map(cb => cb.value);
            
            const data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                problem_desc: document.getElementById('problem_desc').value,
                solution: document.getElementById('solution').value,
                expected_effect: document.getElementById('expected_effect').value,
                priority: document.getElementById('priority').value,
                submitter: document.getElementById('submitter').value || '匿名',
                tags: selectedTags
            };
            
            try {
                const res = await fetch(`${API_BASE}/api/proposals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('提案提交成功！感谢您的参与 💡');
                    e.target.reset();
                    loadStats();
                    switchTab('list');
                } else {
                    const err = await res.json();
                    showToast(err.detail || '提交失败', 'error');
                }
            } catch (e) {
                showToast('网络错误，请稍后重试', 'error');
            }
        });
        
        // 初始化
        checkLogin();
        loadStats();
        loadTags();
    </script>
</body>
</html>
