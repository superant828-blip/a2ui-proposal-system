<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 改善提案系统</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; }
        .login-box { width: 400px; padding: 40px; background: var(--bg-card); border-radius: 16px; text-align: center; }
        .login-box h1 { font-size: 28px; margin-bottom: 8px; }
        .login-box p { color: var(--color-text-secondary); margin-bottom: 32px; }
        .login-box .form-group { text-align: left; }
        .login-box .submit-btn { width: 100%; margin-top: 12px; }
        .login-box .back-link { display: block; margin-top: 20px; color: var(--color-text-secondary); font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>💡 改善提案系统</h1>
        <p>管理员登录</p>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="username" class="form-input" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary submit-btn">登录</button>
            <div id="error-msg" class="empty-state" style="padding:12px;color:var(--color-danger);display:none;"></div>
        </form>
        
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    
    <script src="js/utils.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';
            
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            try {
                const result = await apiPost('/api/auth/login', data);
                localStorage.setItem('a2ui_token', encodeURIComponent(JSON.stringify(result)));
                showToast('登录成功！');
                setTimeout(() => window.location.href = 'admin.html', 500);
            } catch (e) {
                errorMsg.textContent = e.message || '登录失败';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
