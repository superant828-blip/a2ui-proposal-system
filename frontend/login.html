<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 改善提案系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .login-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        
        .login-box h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .login-box p {
            color: #9ca3af;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .submit-btn:hover {
            background: #2563eb;
        }
        
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .back-link {
            display: block;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>💡 改善提案系统</h1>
        <p>管理员登录</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="submit-btn">登录</button>
            <div id="error-msg" class="error-msg"></div>
        </form>
        
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    
    <script>
        // API 地址
        const API_PORT = 8004;
        const apiBase = `${window.location.protocol}//${window.location.hostname}:${API_PORT}`;
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.remove('show');
            errorMsg.textContent = '';
            
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            try {
                const res = await fetch(`${apiBase}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    const result = await res.json();
                    // 保存 token
                    localStorage.setItem('a2ui_token', btoa(JSON.stringify(result)));
                    
                    // 跳转到管理后台
                    window.location.href = 'admin.html';
                } else {
                    const err = await res.json();
                    errorMsg.textContent = err.detail || '登录失败';
                    errorMsg.classList.add('show');
                }
            } catch (e) {
                console.error(e);
                errorMsg.textContent = '无法连接到服务器，请检查服务是否运行';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
