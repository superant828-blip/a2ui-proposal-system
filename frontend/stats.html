<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 24px; }
        .chart-card { background: var(--bg-card); border-radius: var(--border-radius); padding: 20px; }
        .chart-card h3 { font-size: 16px; margin-bottom: 16px; color: var(--color-text-secondary); }
        .chart-container { height: 300px; }
        .chart-full { grid-column: 1 / -1; }
        @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-brand">💡 改善提案系统</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="admin.html" class="nav-link">📋 管理后台</a>
                <a href="stats.html" class="nav-link active">📊 数据看板</a>
                <a href="users.html" class="nav-link">👥 用户管理</a>
            </div>
            <div class="nav-user">
                <span id="user-display"></span>
                <button class="nav-btn" onclick="logout()">退出</button>
            </div>
        </nav>
        
        <div class="page-header">
            <h1 class="page-title">📊 数据看板</h1>
            <button class="btn btn-secondary" onclick="window.location.href='admin.html'">← 返回管理后台</button>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="num" id="stat-total" style="color: #3b82f6;">0</div>
                <div class="label">总提案数</div>
            </div>
            <div class="stat-card green">
                <div class="num" id="stat-adoption" style="color: #10b981;">0%</div>
                <div class="label">采纳率</div>
            </div>
            <div class="stat-card purple">
                <div class="num" id="stat-completion" style="color: #8b5cf6;">0%</div>
                <div class="label">完成率</div>
            </div>
            <div class="stat-card orange">
                <div class="num" id="stat-avg-score" style="color: #f59e0b;">0</div>
                <div class="label">平均评分</div>
            </div>
        </div>
        
        <!-- 额外统计 -->
        <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
            <div class="stat-card">
                <div class="num" id="stat-comments" style="color: #3b82f6;">0</div>
                <div class="label">评论总数</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-attachments" style="color: #10b981;">0</div>
                <div class="label">附件总数</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-positive" style="color: #10b981;">0</div>
                <div class="label">正面情感</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-negative" style="color: #ef4444;">0</div>
                <div class="label">负面情感</div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📁 分类统计</h3>
                <div class="chart-container"><canvas id="categoryChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>📈 状态分布</h3>
                <div class="chart-container"><canvas id="statusChart"></canvas></div>
            </div>
            <div class="chart-card chart-full">
                <h3>📅 评分趋势</h3>
                <div class="chart-container"><canvas id="scoreChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>🎭 情感分析</h3>
                <div class="chart-container"><canvas id="sentimentChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>⚡ 评分分布</h3>
                <div class="chart-container"><canvas id="scoreDistChart"></canvas></div>
            </div>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script>
        // 检查登录
        requireAuth();
        
        // 初始化用户显示
        function initUserDisplay() {
            const user = parseToken();
            const userDisplay = document.getElementById('user-display');
            if (user && userDisplay) {
                userDisplay.textContent = (user.display_name || user.username) + ' (' + user.role + ')';
            }
        }
        initUserDisplay();
        
        
        let charts = {};
        const colors = { blue: '#3b82f6', green: '#10b981', orange: '#f59e0b', purple: '#8b5cf6', red: '#ef4444', gray: '#6b7280' };
        
        async function loadData() {
            try {
                const [overviewRes, chartRes] = await Promise.all([
                    fetch(`${API_BASE}/api/stats/overview`),
                    fetch(`${API_BASE}/api/stats/chart-data`)
                ]);
                const overview = await overviewRes.json();
                const chartData = await chartRes.json();
                updateOverview(overview);
                renderCharts(chartData);
            } catch (e) { console.error(e); }
        }
        
        function updateOverview(data) {
            document.getElementById('stat-total').textContent = data.total;
            document.getElementById('stat-adoption').textContent = data.adoption_rate + '%';
            document.getElementById('stat-completion').textContent = data.completion_rate + '%';
            document.getElementById('stat-avg-score').textContent = data.avg_score;
            document.getElementById('stat-comments').textContent = data.comment_count;
            document.getElementById('stat-attachments').textContent = data.attachment_count;
            document.getElementById('stat-positive').textContent = data.sentiment?.positive || 0;
            document.getElementById('stat-negative').textContent = data.sentiment?.negative || 0;
        }
        
        function renderCharts(data) {
            // 分类图表
            if (charts.category) charts.category.destroy();
            const ctx1 = document.getElementById('categoryChart').getContext('2d');
            charts.category = new Chart(ctx1, {
                type: 'bar',
                data: { labels: data.by_category.map(d => d.name), datasets: [{ label: '提案数', data: data.by_category.map(d => d.total), backgroundColor: colors.blue, borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#9ca3af' } }, x: { ticks: { color: '#9ca3af' } } } }
            });
            
            // 状态图表
            if (charts.status) charts.status.destroy();
            const ctx2 = document.getElementById('statusChart').getContext('2d');
            charts.status = new Chart(ctx2, {
                type: 'doughnut',
                data: { labels: ['待审核', '审核中', '已采纳', '已完成', '已拒绝'], datasets: [{ data: [data.by_status.find(s => s.name === 'pending')?.count || 0, data.by_status.find(s => s.name === 'reviewing')?.count || 0, data.by_status.find(s => s.name === 'approved')?.count || 0, data.by_status.find(s => s.name === 'completed')?.count || 0, data.by_status.find(s => s.name === 'rejected')?.count || 0], backgroundColor: [colors.gray, colors.orange, colors.blue, colors.green, colors.red] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } } } }
            });
            
            // 情感图表
            if (charts.sentiment) charts.sentiment.destroy();
            const ctx3 = document.getElementById('sentimentChart').getContext('2d');
            charts.sentiment = new Chart(ctx3, {
                type: 'pie',
                data: { labels: ['正面', '中立', '负面'], datasets: [{ data: [data.by_sentiment.find(s => s.name === 'positive')?.count || 0, data.by_sentiment.find(s => s.name === 'neutral')?.count || 0, data.by_sentiment.find(s => s.name === 'negative')?.count || 0], backgroundColor: [colors.green, colors.gray, colors.red] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } } } }
            });
            
            // 模拟评分趋势
            if (charts.score) charts.score.destroy();
            const ctx4 = document.getElementById('scoreChart').getContext('2d');
            charts.score = new Chart(ctx4, {
                type: 'line',
                data: { labels: ['第1周', '第2周', '第3周', '第4周'], datasets: [{ label: '平均评分', data: [65, 72, 68, 75], borderColor: colors.purple, backgroundColor: 'rgba(139, 92, 246, 0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100, ticks: { color: '#9ca3af' } }, x: { ticks: { color: '#9ca3af' } } } }
            });
            
            // 评分分布
            if (charts.scoreDist) charts.scoreDist.destroy();
            const ctx5 = document.getElementById('scoreDistChart').getContext('2d');
            charts.scoreDist = new Chart(ctx5, {
                type: 'bar',
                data: { labels: ['0-20', '21-40', '41-60', '61-80', '81-100'], datasets: [{ label: '提案数', data: [2, 5, 8, 12, 3], backgroundColor: [colors.red, colors.orange, colors.gray, colors.blue, colors.green], borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#9ca3af' } }, x: { ticks: { color: '#9ca3af' } } } }
            });
        }
        
        loadData();
    </script>
</body>
</html>
