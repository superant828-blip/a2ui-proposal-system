<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 用户权限管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .header-btns {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-danger { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn:hover { opacity: 0.8; }
        
        /* User Table */
        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .user-table th,
        .user-table td {
            padding: 14px 16px;
            text-align: left;
        }
        
        .user-table th {
            background: rgba(255,255,255,0.1);
            font-weight: 600;
            font-size: 13px;
            color: #9ca3af;
        }
        
        .user-table td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .role-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .role-badge.admin { background: rgba(239,68,68,0.2); color: #ef4444; }
        .role-badge.reviewer { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .role-badge.user { background: rgba(59,130,246,0.2); color: #3b82f6; }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .action-btn.edit { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .action-btn.delete { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            width: 400px;
        }
        
        .modal h2 { margin-bottom: 20px; }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #9ca3af;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-btn.primary { background: #3b82f6; color: #fff; }
        .modal-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 用户权限管理</h1>
            <div class="header-btns">
                <button class="btn btn-secondary" onclick="window.location.href='admin.html'">← 返回管理后台</button>
                <button class="btn btn-primary" onclick="showAddModal()">+ 添加用户</button>
            </div>
        </div>
        
        <table class="user-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>显示名称</th>
                    <th>角色</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="user-tbody">
                <tr><td colspan="6" class="empty-state">加载中...</td></tr>
            </tbody>
        </table>
    </div>
    
    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <h2 id="modal-title">添加用户</h2>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>密码 <span id="password-hint">(留空则不修改)</span></label>
                    <input type="password" id="password">
                </div>
                <div class="form-group">
                    <label>显示名称</label>
                    <input type="text" id="display-name">
                </div>
                <div class="form-group">
                    <label>角色 *</label>
                    <select id="role" required>
                        <option value="user">普通用户</option>
                        <option value="reviewer">审核员</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="modal-btn primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin.replace(':8005', ':8004');
        let currentUser = null;
        
        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('a2ui_token');
            if (!token) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                const user = JSON.parse(atob(token));
                if (user.role !== 'admin') {
                    alert('需要管理员权限');
                    window.location.href = 'admin.html';
                    return null;
                }
                return user;
            } catch {
                window.location.href = 'login.html';
                return null;
            }
        }
        
        // 页面加载时检查
        if (!checkAuth()) {
            // 已经在 checkAuth 中重定向了
        }
        
        // 获取当前登录信息
        function getAuth() {
            const token = localStorage.getItem('a2ui_token');
            return token ? JSON.parse(atob(token)) : null;
        }
        
        // 检查登录
        function checkAuth() {
            const auth = getAuth();
            if (!auth || auth.role !== 'admin') {
                alert('请先登录管理员账号');
                window.location.href = 'login.html';
                return null;
            }
            return auth;
        }
        
        // 加载用户列表
        async function loadUsers() {
            const auth = getAuth();
            if (!auth) return;
            
            try {
                const res = await fetch(`${API_BASE}/api/users`, {
                    headers: { 'Authorization': `Bearer ${auth.token}` }
                });
                
                if (res.status === 401) {
                    alert('登录已过期，请重新登录');
                    window.location.href = 'login.html';
                    return;
                }
                
                const users = await res.json();
                renderUsers(users);
            } catch (e) {
                console.error(e);
            }
        }
        
        // 渲染用户列表
        function renderUsers(users) {
            const tbody = document.getElementById('user-tbody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户</td></tr>';
                return;
            }
            
            const roleMap = { 'admin': '管理员', 'reviewer': '审核员', 'user': '普通用户' };
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.display_name || '-'}</td>
                    <td><span class="role-badge ${u.role}">${roleMap[u.role]}</span></td>
                    <td>${u.created_at ? u.created_at.substring(0, 10) : ''}</td>
                    <td class="action-btns">
                        <button class="action-btn edit" onclick="showEditModal(${u.id}, '${u.username}', '${u.display_name || ''}', '${u.role}')">编辑</button>
                        <button class="action-btn delete" onclick="deleteUser(${u.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 显示添加弹窗
        function showAddModal() {
            document.getElementById('modal-title').textContent = '添加用户';
            document.getElementById('user-id').value = '';
            document.getElementById('user-form').reset();
            document.getElementById('password-hint').style.display = 'none';
            document.getElementById('user-modal').classList.add('active');
        }
        
        // 显示编辑弹窗
        function showEditModal(id, username, displayName, role) {
            document.getElementById('modal-title').textContent = '编辑用户';
            document.getElementById('user-id').value = id;
            document.getElementById('username').value = username;
            document.getElementById('display-name').value = displayName;
            document.getElementById('role').value = role;
            document.getElementById('password').value = '';
            document.getElementById('password-hint').style.display = 'inline';
            document.getElementById('user-modal').classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('user-modal').classList.remove('active');
        }
        
        // 提交表单
        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const auth = getAuth();
            const id = document.getElementById('user-id').value;
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                display_name: document.getElementById('display-name').value
            };
            
            // 密码为空时不提交
            if (!data.password) delete data.password;
            
            try {
                let res;
                if (id) {
                    // 编辑
                    res = await fetch(`${API_BASE}/api/users/${id}`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`
                        },
                        body: JSON.stringify(data)
                    });
                } else {
                    // 新增
                    if (!data.password) {
                        showToast('密码不能为空', 'error');
                        return;
                    }
                    res = await fetch(`${API_BASE}/api/users`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`
                        },
                        body: JSON.stringify(data)
                    });
                }
                
                if (res.ok) {
                    showToast(id ? '更新成功' : '创建成功');
                    closeModal();
                    loadUsers();
                } else {
                    const err = await res.json();
                    showToast(err.detail || '操作失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        });
        
        // 删除用户
        async function deleteUser(id) {
            if (!confirm('确定要删除这个用户吗？')) return;
            
            const auth = getAuth();
            
            try {
                const res = await fetch(`${API_BASE}/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${auth.token}` }
                });
                
                if (res.ok) {
                    showToast('删除成功');
                    loadUsers();
                } else {
                    const err = await res.json();
                    showToast(err.detail || '删除失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }
        
        // Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Init
        loadUsers();
    </script>
</body>
</html>
