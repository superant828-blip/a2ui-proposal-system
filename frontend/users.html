<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 用户权限管理</title>
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-brand">💡 改善提案系统</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="admin.html" class="nav-link">📋 管理后台</a>
                <a href="stats.html" class="nav-link">📊 数据看板</a>
                <a href="users.html" class="nav-link active">👥 用户管理</a>
            </div>
            <div class="nav-user">
                <span id="user-display"></span>
                <button class="nav-btn" onclick="logout()">退出</button>
            </div>
        </nav>
        
        <div class="page-header">
            <h1 class="page-title">👥 系统管理</h1>
            <div style="display:flex;gap:12px;">
                <button class="btn btn-secondary" onclick="switchAdminTab('users')">👥 用户管理</button>
                <button class="btn btn-secondary" onclick="switchAdminTab('tags')">🏷️ 标签管理</button>
                <button class="btn btn-secondary" onclick="switchAdminTab('notifications')">🔔 通知</button>
            </div>
        </div>
        
        <!-- 用户管理 -->
        <div id="users-tab">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h2 style="font-size:18px;">用户列表</h2>
                <button class="btn btn-primary" onclick="showAddUserModal()">+ 添加用户</button>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr><th>ID</th><th>用户名</th><th>显示名称</th><th>角色</th><th>创建时间</th><th>操作</th></tr>
                    </thead>
                    <tbody id="user-tbody">
                        <tr><td colspan="6" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 标签管理 -->
        <div id="tags-tab" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h2 style="font-size:18px;">标签列表</h2>
                <button class="btn btn-primary" onclick="showAddTagModal()">+ 添加标签</button>
            </div>
            <div id="tag-list" style="display:flex;gap:12px;flex-wrap:wrap;"></div>
        </div>
        
        <!-- 通知 -->
        <div id="notifications-tab" style="display:none;">
            <h2 style="font-size:18px;margin-bottom:16px;">系统通知</h2>
            <div id="notification-list">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- 用户 Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <h2 class="modal-title" id="user-modal-title">添加用户</h2>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码 <span id="password-hint">(留空则不修改)</span></label>
                    <input type="password" id="password" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">显示名称</label>
                    <input type="text" id="display-name" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">角色 *</label>
                    <select id="role" class="form-select" required>
                        <option value="user">普通用户</option>
                        <option value="reviewer">审核员</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn modal-btn-secondary" onclick="closeModal('user-modal')">取消</button>
                    <button type="submit" class="modal-btn modal-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 标签 Modal -->
    <div class="modal-overlay" id="tag-modal">
        <div class="modal">
            <h2 class="modal-title">添加标签</h2>
            <form id="tag-form">
                <div class="form-group">
                    <label class="form-label">标签名称 *</label>
                    <input type="text" id="tag-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">颜色</label>
                    <input type="color" id="tag-color" class="form-input" value="#3b82f6" style="height:40px;">
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn modal-btn-secondary" onclick="closeModal('tag-modal')">取消</button>
                    <button type="submit" class="modal-btn modal-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script>
        // 检查管理员权限
        const currentUser = requireAdmin();
        if (!currentUser) throw new Error('需要管理员权限');
        
        // 初始化
        function initUserDisplay() {
            const userDisplay = document.getElementById('user-display');
            if (userDisplay) {
                userDisplay.textContent = (currentUser.display_name || currentUser.username) + ' (' + currentUser.role + ')';
            }
        }
        initUserDisplay();
        
        // 自动登出
        let idleTime = 0;
        setInterval(() => { idleTime++; if (idleTime >= 10) { if (confirm('长时间未操作，是否继续？')) { idleTime = 0; } else { logout(); } } }, 60000);
        document.addEventListener('click', () => idleTime = 0);
        document.addEventListener('keypress', () => idleTime = 0);
        
        // Tab 切换
        function switchAdminTab(tab) {
            document.getElementById('users-tab').style.display = tab === 'users' ? 'block' : 'none';
            document.getElementById('tags-tab').style.display = tab === 'tags' ? 'block' : 'none';
            document.getElementById('notifications-tab').style.display = tab === 'notifications' ? 'block' : 'none';
            
            if (tab === 'users') loadUsers();
            else if (tab === 'tags') loadTags();
            else if (tab === 'notifications') loadNotifications();
        }
        
        // 加载用户
        async function loadUsers() {
            try {
                const users = await apiGet('/api/users');
                const tbody = document.getElementById('user-tbody');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户</td></tr>';
                    return;
                }
                const roleMap = { 'admin': '管理员', 'reviewer': '审核员', 'user': '普通用户' };
                tbody.innerHTML = users.map(u => `<tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.display_name || '-'}</td>
                    <td><span class="badge badge-${u.role}">${roleMap[u.role]}</span></td>
                    <td>${u.created_at ? u.created_at.substring(0, 10) : ''}</td>
                    <td class="action-btns">
                        <button class="btn btn-sm btn-secondary" onclick="showEditUser(${u.id}, '${u.username}', '${u.display_name || ''}', '${u.role}')">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">删除</button>
                    </td>
                </tr>`).join('');
            } catch (e) { console.error(e); }
        }
        
        // 加载标签
        async function loadTags() {
            try {
                const tags = await apiGet('/api/tags');
                const container = document.getElementById('tag-list');
                container.innerHTML = tags.map(t => `<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">
                    <span style="width:12px;height:12px;border-radius:50%;background:${t.color};"></span>
                    <span>${t.name}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteTag(${t.id})">删除</button>
                </div>`).join('');
            } catch (e) { console.error(e); }
        }
        
        // 加载通知
        async function loadNotifications() {
            try {
                const notifs = await apiGet('/api/notifications');
                const container = document.getElementById('notification-list');
                if (notifs.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无通知</div>';
                    return;
                }
                container.innerHTML = notifs.map(n => `<div class="card" style="margin-bottom:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <span style="margin-right:8px;">${n.type === 'proposal' ? '📝' : n.type === 'status' ? '🔄' : n.type === 'comment' ? '💬' : n.type === 'score' ? '⭐' : '🔔'}</span>
                        ${n.message}
                    </div>
                    <span style="color:var(--color-text-muted);font-size:12px;">${n.created_at ? n.created_at.substring(0, 16).replace('T', ' ') : ''}</span>
                </div>`).join('');
            } catch (e) { console.error(e); }
        }
        
        // 用户 Modal
        function showAddUserModal() {
            document.getElementById('user-modal-title').textContent = '添加用户';
            document.getElementById('user-id').value = '';
            document.getElementById('user-form').reset();
            document.getElementById('password-hint').style.display = 'none';
            document.getElementById('user-modal').classList.add('active');
        }
        
        function showEditUser(id, username, displayName, role) {
            document.getElementById('user-modal-title').textContent = '编辑用户';
            document.getElementById('user-id').value = id;
            document.getElementById('username').value = username;
            document.getElementById('display-name').value = displayName;
            document.getElementById('role').value = role;
            document.getElementById('password').value = '';
            document.getElementById('password-hint').style.display = 'inline';
            document.getElementById('user-modal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // 标签 Modal
        function showAddTagModal() {
            document.getElementById('tag-form').reset();
            document.getElementById('tag-modal').classList.add('active');
        }
        
        // 用户表单提交
        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                display_name: document.getElementById('display-name').value
            };
            if (!data.password) delete data.password;
            
            try {
                if (id) {
                    await apiPut(`/api/users/${id}`, data);
                    showToast('更新成功');
                } else {
                    if (!data.password) { showToast('密码不能为空', 'error'); return; }
                    await apiPost('/api/users', data);
                    showToast('创建成功');
                }
                closeModal('user-modal');
                loadUsers();
            } catch (e) { showToast(e.message || '操作失败', 'error'); }
        });
        
        // 标签表单提交
        document.getElementById('tag-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiPost('/api/tags', { name: document.getElementById('tag-name').value, color: document.getElementById('tag-color').value });
                showToast('标签创建成功');
                closeModal('tag-modal');
                loadTags();
            } catch (e) { showToast(e.message || '操作失败', 'error'); }
        });
        
        // 删除用户
        async function deleteUser(id) {
            if (!confirm('确定要删除这个用户吗？')) return;
            try { await apiDelete(`/api/users/${id}`); showToast('删除成功'); loadUsers(); } catch (e) { showToast(e.message || '删除失败', 'error'); }
        }
        
        // 删除标签
        async function deleteTag(id) {
            if (!confirm('确定要删除这个标签吗？')) return;
            try { await apiDelete(`/api/tags/${id}`); showToast('删除成功'); loadTags(); } catch (e) { showToast(e.message || '删除失败', 'error'); }
        }
        
        // 初始化加载
        loadUsers();
    </script>
</body>
</html>
